<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <!-- Gradient for the shield body -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <!-- Cyan accent gradient -->
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#6c2bd9"/>
    </linearGradient>
    <!-- Gold gradient for seal -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffb800"/>
      <stop offset="100%" stop-color="#e6a200"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00d4ff" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Shield shape -->
  <path d="M150 10 L280 55 L280 180 Q280 270 150 330 Q20 270 20 180 L20 55 Z"
        fill="url(#shieldGrad)" stroke="url(#cyanGrad)" stroke-width="3" filter="url(#shadow)"/>

  <!-- Inner shield border -->
  <path d="M150 25 L268 65 L268 178 Q268 258 150 315 Q32 258 32 178 L32 65 Z"
        fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Top accent line -->
  <path d="M60 70 L240 70" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Star burst behind seal -->
  <g transform="translate(150, 115)" opacity="0.15">
    <polygon points="0,-45 10,-15 42,-15 18,5 28,38 0,18 -28,38 -18,5 -42,-15 -10,-15" fill="#00d4ff"/>
  </g>

  <!-- Central seal circle -->
  <circle cx="150" cy="115" r="42" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  <circle cx="150" cy="115" r="36" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Checkmark inside seal -->
  <path d="M130 115 L143 128 L170 100" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decorative dots around seal -->
  <g fill="#ffd700" opacity="0.6">
    <circle cx="150" cy="68" r="2"/>
    <circle cx="175" cy="72" r="2"/>
    <circle cx="196" cy="82" r="2"/>
    <circle cx="125" cy="72" r="2"/>
    <circle cx="104" cy="82" r="2"/>
    <circle cx="196" cy="148" r="2"/>
    <circle cx="104" cy="148" r="2"/>
  </g>

  <!-- ASPA text -->
  <text x="150" y="185" text-anchor="middle" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="42" font-weight="700" fill="#f8f8f8" letter-spacing="6">ASPA</text>

  <!-- Divider line -->
  <line x1="70" y1="195" x2="230" y2="195" stroke="url(#cyanGrad)" stroke-width="2"/>

  <!-- CERTIFIED text -->
  <text x="150" y="225" text-anchor="middle" font-family="'Space Grotesk', 'Arial', sans-serif" font-size="22" font-weight="700" fill="#00d4ff" letter-spacing="4">CERTIFIED</text>

  <!-- SCREEN PRINTER text -->
  <text x="150" y="255" text-anchor="middle" font-family="'Space Grotesk', 'Arial', sans-serif" font-size="16" font-weight="500" fill="rgba(248,248,248,0.7)" letter-spacing="3">SCREEN PRINTER</text>

  <!-- Bottom accent line -->
  <path d="M80 272 L220 272" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.4"/>

  <!-- CSP small text -->
  <text x="150" y="292" text-anchor="middle" font-family="'Inter', 'Arial', sans-serif" font-size="11" font-weight="400" fill="rgba(248,248,248,0.4)" letter-spacing="2">EST. 2004</text>
</svg>